<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝可梦图鉴查询</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
            135deg,
            #74ebd5,
            #9face6
        );
        font-family: "Microsoft YaHei", sans-serif;
    }


    .card {
        width: 420px;
        padding: 45px;
        background: rgba(255,255,255,0.95);
        border-radius: 25px;
        text-align: center;

        box-shadow:
            0 15px 35px rgba(0,0,0,0.2);
    }


    .logo {
        width: 90px;
        height: 90px;
        margin: auto;
        background: #ffcb05;
        border-radius: 50%;

        display: flex;
        justify-content: center;
        align-items: center;

        font-size: 45px;
        border: 5px solid #2a75bb;
    }


    h1 {
        margin-top: 20px;
        color: #2a75bb;
        font-size: 28px;
    }


    .subtitle {
        margin: 10px 0 25px;
        color: #666;
    }


    input {
        width: 100%;
        height: 45px;

        border-radius: 25px;
        border: 2px solid #ddd;

        padding: 0 20px;
        font-size: 16px;

        outline: none;
    }


    input:focus {
        border-color: #ffcb05;
    }


    button {
        width: 100%;
        height: 45px;

        margin-top: 20px;

        border: none;
        border-radius: 25px;

        background: #e3350d;
        color: white;

        font-size: 18px;
        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
    }


    button:hover {
        background: #cc2d0b;
        transform: scale(1.05);
    }


    .footer {
        margin-top: 25px;
        color: #999;
        font-size: 13px;
    }

</style>

</head>


<body>


<div class="card">

    <div class="logo">
        ⚡
    </div>


    <h1>
        宝可梦图鉴
    </h1>


    <div class="subtitle">
        输入编号，查询宝可梦信息
    </div>


    <form action="/pokemon" method="post">

        <input 
            type="number"
            name="id"
            placeholder="例如: 25 (皮卡丘)"
        >


        <button type="submit">
            🔍 查询宝可梦
        </button>

    </form>


    <div class="footer">
        Pokémon National Pokédex
    </div>
</div>
</body>
</html>
